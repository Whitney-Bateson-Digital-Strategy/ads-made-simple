function EmailGate({ children }) {
  const [userEmail, setUserEmail] = useState(() => localStorage.getItem("ams_email") || "");

  const [inputEmail, setInputEmail] = useState("");

  const handleLogin = () => {
    const e = inputEmail.trim().toLowerCase();
    if (!e || !e.includes("@")) { setErr("Please enter a valid email address."); return; }

/* ═══ MAIN ═══ */
function App({ userEmail, onLogout }){
  const[view,setView]=useState("loading");const[step,setStep]=useState(0);const[form,setForm]=useState(INIT);const[loading,setLoading]=useState(false);const[results,setResults]=useState(null);const[activeTab,setActiveTab]=useState(0);const[error,setError]=useState(null);const[vp,setVp]=useState(null);const[vL,setVL]=useState(false);const[vE,setVE]=useState(null);const[showScores,setShowScores]=useState(false);const[loadingSec,setLoadingSec]=useState(0);const[dataLoaded,setDataLoaded]=useState(false);const loadingTimer=useRef(null);const topRef=useRef(null);

  /* Load saved voice + session on mount */
  useEffect(()=>{if(!userEmail)return;(async()=>{
    try{
      const{data:voices}=await sb.from("brand_voices").select("*").eq("email",userEmail).limit(1);
      const voice=voices?.[0];
      if(voice)setVp({summary:voice.summary,traits:voice.traits,sentenceStyle:voice.sentence_style,vocabulary:voice.vocabulary,personality:voice.personality,avoids:voice.avoids});
      const{data:sessions}=await sb.from("sessions").select("*").eq("email",userEmail).limit(1);
      const sess=sessions?.[0];
      if(sess&&sess.results){setResults(sess.results);if(sess.form_data)setForm(f=>({...f,...sess.form_data}));setView("dashboard");}
      else{if(sess&&sess.form_data)setForm(f=>({...f,...sess.form_data}));if(sess&&sess.current_step)setStep(sess.current_step);setView("wizard");}
    }catch(e){console.error("Load error:",e);setView("wizard");}
    setDataLoaded(true);
  })();},[userEmail]);

  /* Auto-save form + step */
  const saveTimer=useRef(null);
  useEffect(()=>{if(!userEmail||!dataLoaded||view!=="wizard")return;clearTimeout(saveTimer.current);saveTimer.current=setTimeout(()=>{sb.from("sessions").upsert({email:userEmail,form_data:form,current_step:step,updated_at:new Date().toISOString()},{onConflict:"email"});},1500);},[form,step,dataLoaded]);
  useEffect(()=>{topRef.current?.scrollIntoView({behavior:"smooth",block:"start"})},[step,view]);
  useEffect(()=>{if(loading){setLoadingSec(0);loadingTimer.current=setInterval(()=>setLoadingSec(s=>s+1),1000);return()=>clearInterval(loadingTimer.current);}else{clearInterval(loadingTimer.current);}},[loading]);
  const set=k=>e=>setForm({...form,[k]:typeof e==="string"?e:e.target.value});

  /* ═══ VALIDATION ═══ */
  const step0Valid=form.leadMagnetName.trim()&&form.whatItHelps.trim();
  const step1Valid=form.audienceType.trim()&&form.biggestPainPoint.trim()&&form.desiredOutcome.trim();
  const step3Valid=step0Valid&&step1Valid&&(form.callToAction!=="Custom"||form.customCta.trim());
  const missingFields=(s)=>{const m=[];if(s===0){if(!form.leadMagnetName.trim())m.push("offer name");if(!form.whatItHelps.trim())m.push("what it helps with");}if(s===1){if(!form.audienceType.trim())m.push("audience");if(!form.biggestPainPoint.trim())m.push("pain point");if(!form.desiredOutcome.trim())m.push("desired outcome");}return m;};

  /* ═══ EXAMPLE PREFILL ═══ */
  const prefillExample=()=>{setForm({...form,leadMagnetName:"5 Steps to Map Out Your Services",leadMagnetType:"PDF / Guide",whatItHelps:"Organize their services so their website is clearer and more clients say yes",businessName:"Whitney Bateson Digital Strategy",audienceType:"Dietitians in private practice who want more clients from their website",biggestPainPoint:"Their website isn't bringing in clients and they have no idea what to change",desiredOutcome:"A clear, professional website that makes people want to book with them",hookFormula:"pain",tone:"Warm & Encouraging",uniqueAngle:"I used to be a practicing dietitian myself, so I know the struggle firsthand",callToAction:"Get the Free Guide"});};

  /* ═══ EDGE FUNCTION HELPERS ═══ */
  const callEdge=async(fnName,body)=>{
    if(!userEmail)throw new Error("Not logged in");
    const r=await fetch(`${SUPABASE_URL}/functions/v1/${fnName}`,{method:"POST",headers:{"Content-Type":"application/json","apikey":SUPABASE_ANON_KEY,"Authorization":`Bearer ${SUPABASE_ANON_KEY}`,"x-user-email":userEmail},body:JSON.stringify({...body,email:userEmail})});

    return d;
  };
  const friendlyError=(e)=>{
    const msg=e?.message||"";
    if(msg.includes("generation"))return msg;

    if(msg.includes("overloaded"))return msg;

  const analyzeVoice=async(text)=>{if(!text||text.trim().length<50){setVE("We need at least a few sentences to get a feel for your voice. Paste a little more and try again!");return;}setVL(true);setVE(null);setVp(null);try{const d=await callEdge("analyze-voice",{writingSample:text});setVp(d.voice);}catch(e){setVE(friendlyError(e));}finally{setVL(false);}};

  const buildCreativeHooks=(f,vars)=>{
    const offer=f.leadMagnetName||"Your Free Guide";const pain=f.biggestPainPoint||"";const outcome=f.desiredOutcome||f.whatItHelps||"";

  const exportCopy=()=>{if(!results)return;let t=`ADS MADE SIMPLE · Ad Copy Export\n${"═".repeat(45)}\nGenerated: ${new Date().toLocaleDateString()}\n`;if(form.businessName)t+=`Business: ${form.businessName}\n`;t+=`Offer: ${form.leadMagnetName}\n`;if(vp)t+=`Voice: ${vp.personality}\n`;t+=`\n`;results.variations.forEach((v,i)=>{const s=results.scores?.[i];t+=`${"-".repeat(45)}\n${v.label.toUpperCase()}${s?` (Score: ${s.overall}/10)`:""}\n${"-".repeat(45)}\n\n`;t+=`PRIMARY TEXT:\n${v.primaryText}\n\nHEADLINE: ${v.headline}\nDESCRIPTION: ${v.description}\nCTA BUTTON: ${v.ctaButton}\n`;if(s)t+=`\nTip: ${s.topTip}\n`;t+=`\n`;});if(results.creativeHooks&&results.creativeHooks.length>0){t+=`${"-".repeat(45)}\nTEXT FOR YOUR AD CREATIVE\n${"-".repeat(45)}\nShort lines to put directly on your ad image:\n\n`;results.creativeHooks.forEach((h,i)=>{t+=`  ${i+1}. ${h}\n`;});t+=`\n`;}t+=`\n${"═".repeat(45)}\nBuilt with Ads Made Simple by Whitney Bateson Digital Strategy\n`;const blob=new Blob([t],{type:"text/plain"});const u=URL.createObjectURL(blob);const a=document.createElement("a");a.href=u;a.download="ad-copy-export.txt";a.click();URL.revokeObjectURL(u);};
  const copyFullAd=(v)=>{const t=`${v.primaryText}\n\nHeadline: ${v.headline}\nDescription: ${v.description}\nCTA: ${v.ctaButton}`;navigator.clipboard.writeText(t);};
  const[copiedFull,setCopiedFull]=useState(-1);

  /* ═══ RENDER ═══ */
  if(view==="loading")return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F.b,color:C.teal}}>Loading your dashboard...</div>;

  return <div ref={topRef} className="app">
    <style>{`

          <CopyBlock tag="Headline" text={v.headline} limits={FB_LIM.headline}/>
          <CopyBlock tag="Description" text={v.description} limits={FB_LIM.description}/>
          <CopyBlock tag="CTA Button" text={v.ctaButton}/>
          {s&&<><button className="score-toggle" onClick={()=>setShowScores(!showScores)}><div style={{display:"flex",alignItems:"center",gap:"12px"}}><div style={{width:"42px",height:"42px",borderRadius:"50%",background:sColor(s.overall),display:"flex",alignItems:"center",justifyContent:"center",color:C.white,fontWeight:800,fontSize:"16px"}}>{s.overall}</div><div><div style={{fontWeight:700,fontSize:"15px",color:C.teal}}>Ad Score</div><div style={{fontSize:"12px",color:C.teal,opacity:.5}}>Tap to {showScores?"hide":"see"} the full breakdown + tips</div></div></div><span style={{fontSize:"18px",transition:"transform .2s",transform:showScores?"rotate(180deg)":"none"}}>▾</span></button>
          {showScores&&<div className="score-detail"><ScoreBar label="Hook Strength" score={s.hookStrength}/><ScoreBar label="Clarity" score={s.clarity}/><ScoreBar label="Emotional Pull" score={s.emotionalPull}/><ScoreBar label="CTA Effectiveness" score={s.ctaEffectiveness}/><div style={{marginTop:"14px",background:C.limeSoft,borderRadius:"12px",padding:"16px 18px",fontSize:"15px",lineHeight:1.6}}>💡 <strong>How to make it even better:</strong> {s.topTip}</div></div>}</>}
        </div>})()}
        {results.creativeHooks&&results.creativeHooks.length>0&&<div className="card" style={{marginTop:"8px"}}>
          <div style={{fontFamily:F.h,fontSize:"17px",fontWeight:700,color:C.teal,marginBottom:"6px"}}>Text for Your Ad Creative</div>
          <p style={{fontSize:"14px",color:C.teal,opacity:.55,lineHeight:1.5,marginBottom:"18px"}}>Short, punchy lines to put directly on your ad image or graphic. Copy one and drop it on your creative!</p>
          {results.creativeHooks.map((hook,i)=><CreativeHookBlock key={i} index={i} text={hook}/>)}
        </div>}
        <div style={{display:"flex",justifyContent:"center",gap:"12px",marginTop:"8px",flexWrap:"wrap"}}><button className="btn-teal" onClick={exportCopy}>📄 Download All Copy</button><button className="btn-outline" onClick={()=>setShowStartOver(true)}>Start Over</button></div>
        <div className="tip">💡 <strong>Quick tip:</strong> Start by running your top-scoring variation. Give it 3 to 5 days and at least 1,000 impressions, then check your CTR and cost per lead. After that, test the next one.</div>
      </div></div>}
    </>}

    {/* Start Over Confirmation Modal */}
    {showStartOver&&<div className="modal-overlay" onClick={()=>setShowStartOver(false)}><div className="modal-card" onClick={e=>e.stopPropagation()}>
      <h3 style={{fontFamily:F.h,fontSize:"22px",fontWeight:800,color:C.teal,marginBottom:"10px"}}>Start over from scratch?</h3>
      <p style={{fontSize:"15px",color:C.teal,opacity:.65,lineHeight:1.7,marginBottom:"8px"}}>This will clear all your current ad copy and form answers so you can create a brand new set of ads.</p>
      <p style={{fontSize:"14px",color:C.coral,fontWeight:600,lineHeight:1.6,marginBottom:"24px"}}>Your brand voice profile will be kept, but your current ad variations will be gone for good. Make sure you've downloaded anything you want to save first!</p>
      <div style={{display:"flex",gap:"12px",justifyContent:"flex-end"}}><button className="btn-outline" onClick={()=>setShowStartOver(false)}>Never mind</button><button className="btn-coral" onClick={startOver}>Yes, start over</button></div>
    </div></div>}

    {/* ═══ WIZARD VIEW ═══ */}
    {view==="wizard"&&<>
      {/* HERO (Step 0) or INNER HERO (Steps 1-3) */}
      {step===0&&<div className="hero"><div className="hero-img"/><div className="hero-text">
        <div className="hero-label">Ads Made Simple</div>
        <h1>Let's Create Your <span>Facebook Ad Copy</span></h1>
        <p>Answer a few quick questions and get 3 scroll-stopping ad variations{vp?", written in your voice":""}, scored and ready to launch.</p>
      </div></div>}
      {step===0&&<div className="hero-wave"><svg viewBox="0 0 1440 60" preserveAspectRatio="none"><path d="M0,0 C360,50 1080,50 1440,0 L1440,60 L0,60 Z" fill={C.cream}/></svg></div>}

      {step>0&&step<5&&<div className="inner-hero">
        <div className="section-label">{STEPS[step]?.label}</div>
        <h2>{STEPS[step]?.title}</h2>
        <p>{STEPS[step]?.desc}</p>
        <div className="progress">{STEPS.map((_,i)=><div key={i} style={{background:i<step?C.coral:i===step?C.lime:C.tealMid}}/>)}</div>
      </div>}

      {/* Step 0 */}
      {step===0&&<>
        <div className="section" style={{background:C.cream,paddingTop:"0"}}>
          <div className="section-inner">
            <div className="card">
              <label className="field">What's your lead magnet or freebie called? <span className="hint">(Or what are you thinking of calling it?)</span></label>
              <input className="inp" placeholder='e.g. "5 Steps to Map Out Your Services"' value={form.leadMagnetName} onChange={set("leadMagnetName")}/>
              <label className="field">What kind of freebie is it?</label>
              <div className="pills">{["PDF / Guide","Workbook","Checklist","Video Training","Quiz","Template","Other"].map(o=><button key={o} className={`pill ${form.leadMagnetType===o?"active":""}`} onClick={()=>set("leadMagnetType")(o)}>{o}</button>)}</div>
              <label className="field">What does it help someone do?</label>
              <textarea className="inp" placeholder="e.g. Organize their services so their website is clearer and more clients say yes" value={form.whatItHelps} onChange={set("whatItHelps")}/>
              <label className="field">Your business name <span className="hint">(totally optional!)</span></label>
              <input className="inp" placeholder="e.g. Whitney Bateson Digital Strategy" value={form.businessName} onChange={set("businessName")}/>
            </div>
          </div>
        </div>
        <div className="section" style={{background:C.white}}>
          <div className="section-inner">
            <div className="card-alt">
              <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px"}}><h3 style={{margin:0}}>Your Brand Voice</h3><span className="tag" style={{background:C.pink,fontSize:"10px"}}>Optional</span></div>
              <p style={{fontSize:"16px",color:C.teal,opacity:.55,marginBottom:"22px",lineHeight:1.6}}>Want your ads to actually sound like <em>you</em>? Paste a sample of your writing and we'll learn your style.</p>
              <label className="field">Paste something you've written <span className="hint">(a blog post, email, Instagram caption, your About page... anything!)</span></label>
              <textarea className="inp" style={{minHeight:"120px"}} placeholder={"Drop in a paragraph or two of your writing here.\n\nThe more you share, the better we can match your voice. Even a few sentences work!"} value={form.writingSample} onChange={set("writingSample")}/>
              <button className="btn-teal btn-sm" disabled={vL||!form.writingSample.trim()} onClick={()=>analyzeVoice(form.writingSample)}>{vL?<span className="spinner" style={{gap:"8px"}}>Analyzing <Spinner/></span>:"🔍 Analyze My Voice"}</button>
              {vL&&<div style={{display:"flex",alignItems:"center",gap:"10px",background:C.ltBlue+"44",border:`1.5px solid ${C.ltBlue}`,borderRadius:"12px",padding:"14px 18px",fontSize:"15px",color:C.teal,marginTop:"16px"}}><Spinner dark/> Getting to know your writing style...</div>}
              {vE&&<div className="tip tip-warn">{vE}</div>}
              {vp&&<div style={{marginTop:"20px"}}><div className="voice-badge">✅ <strong>Got it! Here's what we picked up:</strong></div><div style={{background:C.white,border:`1.5px solid ${C.tealMid}`,borderRadius:"14px",padding:"22px",fontSize:"15px",lineHeight:1.7}}><div style={{fontWeight:700,marginBottom:"8px",fontSize:"16px"}}>{vp.summary}</div><div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"12px"}}>{vp.traits?.map((t,i)=><span key={i} style={{background:C.lime+"88",padding:"4px 14px",borderRadius:"14px",fontSize:"13px",fontWeight:600}}>{t}</span>)}</div><div style={{opacity:.65,fontSize:"14px"}}><strong>Personality:</strong> {vp.personality} · <strong>Style:</strong> {vp.sentenceStyle}</div></div><button className="btn-outline" style={{marginTop:"10px",padding:"8px 18px",fontSize:"13px",borderRadius:"8px"}} onClick={()=>{setVp(null);setVE(null)}}>Try Again</button></div>}
              {!vp&&!vL&&<div className="tip">💡 <strong>No worries if you skip this!</strong> We'll still write great ad copy for you. It just won't be customized to your specific voice.</div>}
            </div>
            <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:"14px",marginTop:"8px"}}>{!step0Valid&&<span style={{fontSize:"13px",color:C.coral,opacity:.7}}>Fill in your {missingFields(0).join(" & ")} to continue</span>}<button className="btn-coral" disabled={!step0Valid} onClick={()=>setStep(1)}>Next →</button></div>
          </div>
        </div>
      </>}

      {/* Step 1 */}
      {step===1&&<div className="section" style={{background:C.cream}}><div className="section-inner">{voiceBadge()}<div className="card">
        <label className="field">Who are you trying to reach?</label>
        <input className="inp" placeholder="e.g. Dietitians in private practice who want more clients from their website" value={form.audienceType} onChange={set("audienceType")}/>
        <label className="field">What's the thing that's frustrating them the most right now?</label>
        <textarea className="inp" placeholder="e.g. Their website isn't bringing in clients and they have no idea what to change" value={form.biggestPainPoint} onChange={set("biggestPainPoint")}/>
        <label className="field">And what do they actually want instead?</label>
        <textarea className="inp" placeholder="e.g. A clear, professional website that makes people want to book with them" value={form.desiredOutcome} onChange={set("desiredOutcome")}/>
        <div className="tip">💡 <strong>Remember from the training:</strong> The best ads follow this flow: <em>Problem they recognize → Solution they want → Clear benefit.</em> Keep that in mind as you fill this out!</div>
      </div>{!step1Valid&&<div style={{fontSize:"13px",color:C.coral,opacity:.7,textAlign:"right",marginTop:"6px"}}>Fill in your {missingFields(1).join(", ")} to continue</div>}<div style={{display:"flex",gap:"12px",justifyContent:"flex-end",marginTop:"8px"}}><button className="btn-outline" onClick={()=>setStep(0)}>← Back</button><button className="btn-coral" disabled={!step1Valid} onClick={()=>setStep(2)}>Next →</button></div></div></div>}

      {/* Step 2 */}
      {step===2&&<><div className="section" style={{background:C.cream}}><div className="section-inner"><div className="card"><h3>Pick a Hook Formula</h3><p style={{fontSize:"15px",opacity:.5,marginBottom:"18px",lineHeight:1.5}}>These are proven ways to open your ad. Pick one, or let us surprise you!</p>{HOOKS.map(h=><button key={h.id} className={`hook-card ${form.hookFormula===h.id?"active":""}`} onClick={()=>set("hookFormula")(h.id)}><span style={{fontSize:"22px",flexShrink:0,marginTop:"1px"}}>{h.emoji}</span><div><div className="name">{h.name}</div><div className="tmpl">{h.template}</div>{h.example&&<div className="ex">e.g. "{h.example}"</div>}</div></button>)}</div></div></div>
      <div className="section" style={{background:C.white}}><div className="section-inner"><div className="card">
        <label className="field">What vibe fits your brand best?</label>
        {vp&&<div style={{fontSize:"14px",color:C.coral,marginBottom:"10px",fontStyle:"italic"}}>We'll blend this with your voice profile. Think of this as an extra nudge in a direction.</div>}
        <div className="pills">{["Warm & Encouraging","Professional & Direct","Casual & Fun","Bold & Confident","Educational & Helpful"].map(o=><button key={o} className={`pill ${form.tone===o?"active":""}`} onClick={()=>set("tone")(o)}>{o}</button>)}</div>
        <label className="field">Anything unique about you or your offer? <span className="hint">(totally optional)</span></label>
        <textarea className="inp" placeholder="e.g. I used to be a practicing dietitian myself, so I know the struggle firsthand" value={form.uniqueAngle} onChange={set("uniqueAngle")}/>
      </div><div style={{display:"flex",gap:"12px",justifyContent:"flex-end",marginTop:"8px"}}><button className="btn-outline" onClick={()=>setStep(1)}>← Back</button><button className="btn-coral" onClick={()=>setStep(3)}>Next →</button></div></div></div></>}

      {/* Step 3 */}
      {step===3&&<div className="section" style={{background:C.cream}}><div className="section-inner"><div className="card">
        <label className="field">What do you want people to do when they see your ad?</label>
        <div className="pills">{["Download Now","Get the Free Guide","Sign Me Up","Grab Your Copy","Custom"].map(o=><button key={o} className={`pill ${form.callToAction===o?"active":""}`} onClick={()=>set("callToAction")(o)}>{o}</button>)}</div>
        {form.callToAction==="Custom"&&<input className="inp" placeholder="Type your custom CTA here..." value={form.customCta} onChange={set("customCta")}/>}
        <div style={{background:C.ltBlue+"33",border:`1.5px solid ${C.ltBlue}`,borderRadius:"14px",padding:"22px",fontSize:"15px",lineHeight:1.9,marginTop:"8px"}}><strong>Here's what we're working with:</strong><br/><span style={{opacity:.65}}><strong>Offer:</strong> {form.leadMagnetName||"(not filled in yet)"}<br/><strong>Audience:</strong> {form.audienceType||"(not filled in yet)"}<br/><strong>Hook:</strong> {HOOKS.find(h=>h.id===form.hookFormula)?.name||"Surprise Me!"}<br/><strong>Vibe:</strong> {form.tone}{vp&&<><br/><span style={{color:C.coral}}>🎯 Writing in your brand voice</span></>}</span></div>
        {error&&<div className="tip tip-warn">{error}</div>}
        <div style={{marginTop:"28px"}}><button className="btn-teal" disabled={loading||!step3Valid} style={{width:"100%",fontSize:"18px",padding:"18px",borderRadius:"14px"}} onClick={generate}>{loading?<span className="spinner" style={{gap:"8px"}}>{vp?"Writing 3 versions in your voice":"Cooking up 3 ad variations"} <Spinner/></span>:!step3Valid?"Fill in the required fields above":"✨ Write My Ads!"}</button></div>
        {loading&&<div style={{textAlign:"center",marginTop:"12px",fontSize:"14px",color:C.teal,opacity:.55}}>{loadingSec<10?"This usually takes about 20 seconds...":loadingSec<25?"Still working on it...":loadingSec<45?"Almost there, writing the last variation...":"Taking a bit longer than usual, hang tight..."}</div>}
        <div style={{display:"flex",gap:"12px",marginTop:"14px"}}><button className="btn-outline" onClick={()=>setStep(2)}>← Back</button></div>
      </div></div></div>}
    </>}

    <div className="footer"><img src={IMG.logoW} alt="Whitney Bateson"/><p>Built for Ads Made Simple by Whitney Bateson Digital Strategy</p></div>
  </div>;
}


/* ═══ ROOT WITH AUTH ═══ */
function Root() {
  return React.createElement(EmailGate, null,
    React.createElement(App)
  );
}

ReactDOM.render(React.createElement(Root), document.getElementById("root"));
</script>
</body>
</html>
